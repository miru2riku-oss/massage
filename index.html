<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マッサージ券 管理システム</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>💆‍♂️ マッサージ券 管理システム</h1>

    <div class="section">
        <h2>チケットを発行</h2>
        <select id="massageDuration">
            <option value="10">10分コース</option>
            <option value="15">15分コース</option>
            <option value="30" selected>30分コース</option>
            <option value="60">60分コース</option>
            <option value="90">90分コース</option>
        </select>
        <button onclick="issueTicket()">新規発行する</button>
        <div id="issuedTicketId" class="ticket-id-display"></div>
        <div id="issueMessage" class="result-box"></div>
    </div>

    <div class="section">
        <h2>チケットを使用</h2>
        <input type="text" id="ticketInput" placeholder="6桁のIDを入力" maxlength="6">
        <button onclick="useTicket()">使用する</button>
        <div id="useMessage" class="result-box"></div>
    </div>

    <div class="section" style="border-bottom: none;">
        <button class="secondary-btn" onclick="openHistory()">📋 発行・使用履歴を見る</button>
    </div>
</div>

<div class="version-text">v1.1.0</div>

<div id="historyModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeHistory()">&times;</span>
        <h2 style="margin-top: 0; text-align: center;">チケット履歴</h2>
        
        <div class="history-list">
            <h3>🎫 未使用のチケット</h3>
            <ul id="unusedList"></ul>

            <h3 style="color: #757575; border-color: #757575;">✅ 使用済みのチケット</h3>
            <ul id="usedList"></ul>
        </div>
    </div>
</div>

<script>
    // --- データベース（ローカルストレージ）操作 ---
    function getTicketDatabase() {
        const data = localStorage.getItem('massageTicketDB');
        return data ? JSON.parse(data) : {}; 
    }

    function saveTicketDatabase(db) {
        localStorage.setItem('massageTicketDB', JSON.stringify(db));
    }

    function showMessage(elementId, message, isSuccess) {
        const box = document.getElementById(elementId);
        box.className = `result-box show ${isSuccess ? 'success' : 'error'}`;
        box.innerText = message;
    }

    // --- メイン機能 ---

    // 1. チケット発行処理
    function issueTicket() {
        const db = getTicketDatabase();
        const duration = document.getElementById('massageDuration').value; // 選んだ分数を取得
        let newId;

        do {
            newId = Math.floor(100000 + Math.random() * 900000).toString();
        } while (db.hasOwnProperty(newId));

        // データの保存形式をアップデート（分数や日付も一緒に保存）
        const now = new Date();
        const dateString = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
        
        db[newId] = {
            used: false,
            duration: duration,
            date: dateString
        };
        
        saveTicketDatabase(db);

        const displayBox = document.getElementById('issuedTicketId');
        displayBox.style.display = 'block';
        displayBox.innerText = newId;
        showMessage('issueMessage', `${duration}分のチケットを発行しました！`, true);
        
        document.getElementById('useMessage').className = 'result-box';
    }

    // 2. チケット使用処理
    function useTicket() {
        const ticketId = document.getElementById('ticketInput').value;

        if (!ticketId || ticketId.length !== 6 || isNaN(ticketId)) {
            showMessage('useMessage', '6桁の数字を正しく入力してください。', false);
            return;
        }

        const db = getTicketDatabase();

        if (!db.hasOwnProperty(ticketId)) {
            showMessage('useMessage', '無効なチケットIDです。', false);
            return;
        }

        // 古いバージョンで作ったデータにも対応するための処理
        const ticketData = db[ticketId];
        const isUsed = typeof ticketData === 'boolean' ? ticketData : ticketData.used;
        const duration = typeof ticketData === 'boolean' ? '不明な' : ticketData.duration;

        if (isUsed === true) {
            showMessage('useMessage', 'このチケットは既に使用済みです。', false);
        } else {
            // 使用済みに更新
            if (typeof ticketData === 'boolean') {
                db[ticketId] = true; // 古いデータ形式の場合
            } else {
                db[ticketId].used = true; // 新しいデータ形式の場合
            }
            saveTicketDatabase(db);
            
            // 何分のチケットを使用したかを表示
            showMessage('useMessage', `🎉 ${duration}分 のチケットを使用しました！`, true);
            document.getElementById('ticketInput').value = '';
        }
    }

    // 3. 履歴モーダルの表示・非表示
    function openHistory() {
        const db = getTicketDatabase();
        const unusedList = document.getElementById('unusedList');
        const usedList = document.getElementById('usedList');
        
        // リストを一旦空にする
        unusedList.innerHTML = '';
        usedList.innerHTML = '';

        // データを一つずつ取り出してリストに追加
        for (let id in db) {
            const ticketData = db[id];
            const isUsed = typeof ticketData === 'boolean' ? ticketData : ticketData.used;
            const duration = typeof ticketData === 'boolean' ? '?' : ticketData.duration;
            const date = typeof ticketData === 'boolean' || !ticketData.date ? '' : ticketData.date;

            const li = document.createElement('li');
            li.innerHTML = `
                <span>ID: <strong>${id}</strong> (${duration}分)</span>
                <span class="history-date">${date}</span>
            `;

            if (isUsed) {
                usedList.appendChild(li);
            } else {
                unusedList.appendChild(li);
            }
        }

        // データが0件の場合のメッセージ
        if(unusedList.innerHTML === '') unusedList.innerHTML = '<li>未使用のチケットはありません</li>';
        if(usedList.innerHTML === '') usedList.innerHTML = '<li>使用済みのチケットはありません</li>';

        document.getElementById('historyModal').style.display = 'block';
    }

    function closeHistory() {
        document.getElementById('historyModal').style.display = 'none';
    }

    // モーダルの外枠をクリックした時にも閉じる機能
    window.onclick = function(event) {
        const modal = document.getElementById('historyModal');
        if (event.target === modal) {
            closeHistory();
        }
    }
</script>

</body>
</html>
