<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マッサージ券 管理システム</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>マッサージ券 管理システム</h1>

    <div class="section">
        <h2>チケットを発行</h2>
        <button onclick="issueTicket()">新規発行する</button>
        <div id="issuedTicketId" class="ticket-id-display"></div>
        <div id="issueMessage" class="result-box"></div>
    </div>

    <div class="section">
        <h2>チケットを使用</h2>
        <input type="text" id="ticketInput" placeholder="6桁のIDを入力" maxlength="6">
        <button onclick="useTicket()">使用する</button>
        <div id="useMessage" class="result-box"></div>
    </div>
</div>

<script>
    const API_BASE_URL = 'http://localhost:8080/api/tickets';

    // メッセージ表示用の共通関数
    function showMessage(elementId, message, isSuccess) {
        const box = document.getElementById(elementId);
        box.className = `result-box show ${isSuccess ? 'success' : 'error'}`;
        box.innerText = message;
    }

    // チケット発行処理
    async function issueTicket() {
        const displayBox = document.getElementById('issuedTicketId');
        
        try {
            // 修正箇所: 通信の形式をより厳密に指定しました
            const response = await fetch(`${API_BASE_URL}/issue`, { 
                method: 'POST',
                headers: {
                    'Accept': 'text/plain',
                    'Content-Type': 'application/json'
                }
            });
            
            if (response.ok) {
                const id = await response.text();
                displayBox.style.display = 'block';
                displayBox.innerText = id;
                showMessage('issueMessage', '発行完了！', true);
            } else {
                // 404(Not Found)などのHTTPエラーをキャッチ
                throw new Error(`ステータス ${response.status}`);
            }
        } catch (error) {
            // 修正箇所: 単なる「失敗」ではなく、具体的なエラー理由を画面に出力します
            console.error("エラー詳細:", error);
            showMessage('issueMessage', `発行に失敗しました (${error.message})`, false);
        }
    }

    // チケット使用処理
    async function useTicket() {
        const ticketId = document.getElementById('ticketInput').value;

        if (!ticketId || ticketId.length !== 6) {
            showMessage('useMessage', '6桁のIDを入力してください。', false);
            return;
        }

        try {
            const response = await fetch(`${API_BASE_URL}/use`, {
                method: 'POST',
                headers: { 
                    'Accept': 'application/json',
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({ id: ticketId })
            });
            
            if (!response.ok) {
                throw new Error(`ステータス ${response.status}`);
            }

            const result = await response.json();

            if (result.status === 'success') {
                showMessage('useMessage', result.message, true);
            } else {
                showMessage('useMessage', result.message, false);
            }
        } catch (error) {
            console.error("エラー詳細:", error);
            showMessage('useMessage', `通信エラー (${error.message})`, false);
        }
    }
</script>

</body>
</html>
